<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Scan Aushadhi • Premium</title> 
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <style> 
        /* RESET & BASE */
        html {
            font-size: 14px; /* Slightly smaller base for compact UI */
            -webkit-text-size-adjust: 100%;
        }
        :root { 
            --primary-start: #22c55e; 
            --primary-end: #16a34a; 
            --accent: #f97316;
            --primary-gradient: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%); 
            --bg: #f8fafc; /* Cleaner, flatter background */
            --surface: rgba(255, 255, 255, 0.9); /* Lighter glass */
            --surface-solid: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --border: rgba(34,197,94,0.1); 
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04); 
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --glow: 0 4px 12px rgba(34,197,94,0.2); 
            --safe-bottom: env(safe-area-inset-bottom, 1rem);
        } 
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; -webkit-tap-highlight-color:transparent; touch-action:manipulation; outline: none; } 
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            min-height: 100dvh; 
            line-height: 1.5; 
            overflow-x: hidden; 
        } 
        
        /* APP CONTAINER */
        #app-container { 
            width: 100%;
            max-width: 480px; /* Mobile strict sizing */
            margin: 0 auto;
            min-height: 100dvh;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.05); /* Premium separation on desktop */
        }
        
        /* HEADER */ 
        .app-header { 
            padding: 0.6rem 1rem; 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            text-align: center; 
        } 
        .app-title { 
            font-family:'Caveat',cursive; 
            font-size: 1.6rem; 
            font-weight: 700; 
            background: var(--primary-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: inline-block;
        } 
        .app-title::before, .app-title::after { content: "🌿"; font-size: 0.8em; -webkit-text-fill-color: initial; color: var(--primary-start); margin: 0 4px; }
        
        /* SCREENS */
        .screen { 
            display: none; 
            flex: 1;
            overflow-y: auto;
            padding: 1rem; 
            padding-bottom: calc(5rem + var(--safe-bottom)); /* Nav bar spacing */
            animation: fadeUp 0.3s ease-out; 
        } 
        .screen.active { display: block; } 
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} } 
        
        /* CARDS & UI ELEMENTS */
        .card { 
            background: var(--surface-solid); 
            border-radius: 1rem; 
            padding: 0.85rem; 
            margin-bottom: 0.75rem; 
            border: 1px solid rgba(0,0,0,0.03); 
            box-shadow: var(--shadow-sm); 
        } 
        .card.appear { animation:cardIn 0.35s ease-out forwards; } 
        @keyframes cardIn { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:none} } 
        
        /* BUTTONS - Compact & Premium */
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 0.4rem; 
            width: 100%; padding: 0.65rem 1rem; 
            border-radius: 99px; 
            background: var(--primary-gradient); color: white; 
            font-size: 0.95rem; font-weight: 600; 
            box-shadow: var(--glow); border: none; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        } 
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none !important; } 
        .btn:active:not(:disabled) { transform: scale(0.97); } 
        
        .btn-outline { 
            background: var(--surface-solid); 
            border: 1px solid var(--primary-start); 
            color: var(--primary-end); 
            display: flex; align-items: center; justify-content: center; gap: 0.4rem; 
            cursor: pointer; font-weight: 600; 
            box-shadow: var(--shadow-sm); 
        } 
        
        /* PREMIUM LOADING ANIMATION */
        .premium-loader {
            display: flex; justify-content: center; gap: 6px; margin: 1.5rem 0;
        }
        .premium-loader .dot {
            width: 8px; height: 8px; background: var(--primary-start); border-radius: 50%;
            animation: premium-pulse 1.2s infinite ease-in-out both;
        }
        .premium-loader .dot:nth-child(1) { animation-delay: -0.32s; }
        .premium-loader .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes premium-pulse {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
        }
        #scan-loader, #tab-loader .empty-state { text-align: center; padding: 2rem 1rem; } 

        /* RESULTS STYLING */
        .result-name { font-size: 1.4rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.2rem; line-height: 1.2; } 
        
        .result-confidence { font-size: 0.85rem; color: var(--primary-start); font-weight: 600; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.3rem; }

        .badge-container { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px dashed var(--border); }
        .badge { padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .category-badge { background: rgba(34,197,94,0.1); color: var(--primary-end); border: 1px solid rgba(34,197,94,0.2); }
        .type-badge { background: rgba(249,115,22,0.1); color: var(--accent); border: 1px solid rgba(249,115,22,0.2); }
        
        .result-card { 
            background: var(--surface-solid); border: 1px solid rgba(0,0,0,0.04); 
            border-radius: 0.85rem; padding: 0.85rem; margin-bottom: 0.65rem; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
        }
        .result-card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; border-bottom: 1px solid rgba(0,0,0,0.03); padding-bottom: 0.4rem; }
        .result-icon { font-size: 1.1rem; }
        .result-label { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        .result-value-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; line-height: 1.5; color: var(--text-muted); }
        .result-value-list li { position: relative; padding-left: 1.1rem; margin-bottom: 0.3rem; }
        .result-value-list li:last-child { margin-bottom: 0; }
        .result-value-list li::before { content: "🌿"; position: absolute; left: 0; top: 0.1rem; color: var(--primary-start); font-size: 0.65rem; opacity: 0.8;}

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); } 
        
        /* BOTTOM NAV */
        .bottom-nav { 
            position: fixed; 
            bottom: var(--safe-bottom); 
            left: 50%; transform: translateX(-50%); 
            width: calc(100% - 2rem); max-width: 400px; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 99px; display: flex; justify-content: space-around; 
            padding: 0.4rem 0.5rem; box-shadow: var(--shadow-md); z-index: 100; 
        } 
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 0.15rem; 
            padding: 0.4rem 1rem; border-radius: 99px; color: var(--text-muted); 
            font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s; 
        } 
        .nav-item i { font-size: 1.1rem; margin-bottom: 2px; transition: transform 0.2s; } 
        .nav-item.active { background: var(--primary-gradient); color: white; box-shadow: var(--glow); } 
        .nav-item.active i { transform: scale(1.1); } 
        
        /* ACTION SHEETS */
        .action-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px); z-index: 1999; opacity: 0; visibility: hidden; transition: opacity 0.3s; } 
        .action-overlay.active { opacity: 1; visibility: visible; } 
        .action-sheet { 
            position: fixed; bottom: 0; left: 50%; 
            transform: translate(-50%, 100%); width: 100%; max-width: 480px; 
            background: var(--surface-solid); 
            border-radius: 1.5rem 1.5rem 0 0; 
            padding: 1rem 1.25rem calc(1.5rem + var(--safe-bottom)); 
            z-index: 2000; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); 
        } 
        .action-sheet.active { transform: translate(-50%, 0); } 
        .scan-limit { text-align: center; margin: 0.5rem 0 1rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; } 
        input[type="file"] { display: none; } 
        
        /* CAMERA */ 
        #camera-container { display: none; margin-bottom: 0.75rem; } 
        .camera-wrapper { position: relative; border-radius: 1rem; overflow: hidden; background: #000; box-shadow: var(--shadow-sm); margin-bottom: 0.75rem; border: 2px solid var(--primary-start); } 
        #camera-preview { width: 100%; max-height: 50vh; object-fit: cover; display: block; } 
        .capture-overlay { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 10; width: 80%; } 

        /* CHAT UI - FULLY FIXED */
        .chat-sheet {
            height: 100dvh; /* Strict mobile height */
            max-height: 100dvh;
            border-radius: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            /* removed top: 0 and bottom: auto so it inherently anchors to the bottom */
        }
        .chat-header { 
            padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--surface-solid); 
            flex-shrink: 0; /* Prevent header shrink */
        }
        .chat-header h3 { margin: 0; font-size: 1.1rem; color: var(--primary-end); display: flex; align-items: center; gap: 0.4rem; font-weight: 700; }
        .chat-close-btn { 
            background: rgba(34,197,94,0.1); border: none; border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.1rem; color: var(--primary-end); cursor: pointer; 
        }
        
        .chat-body {
            flex: 1 1 auto; /* Grow and shrink properly */
            overflow-y: auto;
            min-height: 0; /* Critical for nested flex scrolling */
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: var(--bg);
            scroll-behavior: smooth;
        }
        
        .chat-bubble { 
            max-width: 85%; padding: 0.65rem 0.85rem; border-radius: 1rem; 
            font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; 
            animation: fadeUp 0.2s ease-out; box-shadow: 0 2px 6px rgba(0,0,0,0.03); 
        }
        .chat-bubble.ai { background: var(--surface-solid); color: var(--text-main); border: 1px solid var(--border); border-bottom-left-radius: 0.2rem; align-self: flex-start; }
        .chat-bubble.user { background: var(--primary-gradient); color: white; border-bottom-right-radius: 0.2rem; align-self: flex-end; }
        .chat-bubble.system { align-self: center; font-size: 0.75rem; color: var(--primary-end); background: rgba(34,197,94,0.08); border-radius: 99px; padding: 0.2rem 0.8rem; text-align: center; }
        
        .chat-input-area {
            flex-shrink: 0;
            padding: 0.6rem 0.8rem calc(0.6rem + var(--safe-bottom)); /* Safe area support */
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 0.5rem;
            background: var(--surface-solid);
            align-items: center;
            width: 100%;
        }
        .chat-mic-btn, .chat-send-btn { 
            width: 2.5rem; height: 2.5rem; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
            font-size: 1rem; border: none; transition: transform 0.2s; cursor: pointer;
        }
        .chat-mic-btn { background: rgba(34,197,94,0.1); color: var(--primary-end); }
        .chat-mic-btn.listening { background: rgba(249,115,22,0.1); color: var(--accent); animation: pulse-mic 1.5s infinite; }
        .chat-send-btn { background: var(--primary-gradient); color: white; box-shadow: var(--glow); }
        .chat-send-btn:disabled { opacity: 0.5; box-shadow: none; cursor: not-allowed; transform: none; }
        
        .chat-input-box { 
            flex: 1 1 auto; min-width: 0; /* Prevent flex overflow */
            border: 1px solid rgba(0,0,0,0.1); border-radius: 99px; 
            padding: 0.6rem 1rem; font-size: 0.95rem; background: #f8fafc; 
            transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); 
        }
        .chat-input-box:focus { border-color: var(--primary-end); background: #ffffff; box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
        
        @keyframes pulse-mic { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* SETTINGS */
        .settings-list { padding: 0; margin-top: 0.5rem; }
        .setting-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0.8rem 0.5rem; border-bottom: 1px solid rgba(0,0,0,0.04); 
        }
        .setting-icon-group { display: flex; align-items: center; gap: 0.75rem; }
        .setting-icon-group i { color: var(--primary-end); font-size: 1.1rem; width: 1.5rem; text-align: center; }
        .setting-text strong { display: block; font-size: 0.95rem; color: var(--text-main); }
        .setting-text p { font-size: 0.75rem; color: var(--text-muted); margin: 0; }
        select { padding: 0.4rem 0.75rem; border-radius: 8px; border: 1px solid var(--border); color: var(--primary-end); font-size: 0.85rem; font-weight: 500; background: var(--surface-solid); }

        .settings-actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; padding: 0 0.5rem; }
        .settings-actions .btn-outline { justify-content: flex-start; border: none; background: transparent; padding: 0.8rem 0.5rem; border-radius: 8px; box-shadow: none; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .settings-actions .btn-outline i { width: 1.5rem; text-align: center; }

        /* CENTER POPUP */ 
        .popup-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); z-index: 3000; display: none; align-items: center; justify-content: center; } 
        .popup-card { background: var(--surface-solid); width: 85%; max-width: 320px; border-radius: 1.25rem; padding: 1.5rem; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transform: scale(0.9); opacity: 0; transition: all 0.25s ease-out; } 
        .popup-overlay.active .popup-card { transform: scale(1); opacity: 1; } 
        .popup-icon { font-size: 2.5rem; margin-bottom: 0.5rem; } 
        .popup-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.25rem; } 
        .popup-msg { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 1.25rem; } 
        .popup-close { padding: 0.6rem 1.5rem; background: rgba(34,197,94,0.1); color: var(--primary-end); border: none; border-radius: 99px; font-weight: 600; font-size: 0.9rem; width: 100%; cursor: pointer; } 

        /* RIPPLE EFFECT */
        span.ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.5s linear; background-color: rgba(255, 255, 255, 0.4); pointer-events: none; }
        .btn-outline span.ripple, .nav-item:not(.active) span.ripple, .popup-close span.ripple { background-color: rgba(34, 197, 94, 0.15); }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>
<div id="app-container"> 
    <header class="app-header"> 
        <div class="app-title" id="app-title">Scan Aushadhi</div> 
    </header> 
    
    <div id="tab-loader" class="screen">
        <div class="empty-state" style="padding-top: 6rem;">
            <div class="premium-loader">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <p id="lbl-tab-loading" style="color: var(--primary-end); font-weight: 600; margin-top: 0.5rem; font-size: 1rem;">Loading...</p>
        </div>
    </div>

    <div id="home" class="screen active">
        <div id="history-container"></div>
    </div> 
    
    <div id="scan" class="screen"> 
        <button id="scan-btn" class="btn" onclick="openScanner()">
            <i class="fas fa-leaf"></i> <span id="lbl-scan-main-btn">Scan Medicine</span>
        </button> 
        <div class="scan-limit" id="lbl-scan-limit">Daily Free Scans: 0/3</div> 
        
        <div id="camera-container"> 
            <div class="camera-wrapper"> 
                <video id="camera-preview" autoplay playsinline></video> 
                <div class="capture-overlay"> 
                    <button id="capture-btn" class="btn"><i class="fas fa-camera"></i> Capture Photo</button> 
                </div> 
            </div> 
            <button onclick="stopCamera()" class="btn btn-outline" style="border-radius:99px; padding:0.6rem;">✕ Close Camera</button> 
        </div> 
        
        <canvas id="image-canvas" style="display:none;"></canvas> 
        <div id="scan-loader" style="display:none;"> 
            <div class="premium-loader">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div id="loading-text" style="color: var(--primary-end); font-weight: 500; font-size: 0.95rem;">Analyzing image<span id="dots">...</span></div> 
        </div> 
        <div id="scan-result" style="display:none; margin-top: 0.5rem;"></div> 
    </div> 

    <div id="settings" class="screen"> 
        <div class="settings-list"> 
            <div class="setting-item"> 
                <div class="setting-icon-group">
                    <i class="fas fa-language"></i>
                    <div class="setting-text"><strong id="lbl-language">Language</strong><p id="lbl-lang-desc">Output language</p></div>
                </div> 
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                </select> 
            </div> 
            
            <div class="settings-actions">
                <button onclick="shareApp()" class="btn-outline">📤 <span id="lbl-share">Share App</span></button>
                <button onclick="rateApp()" class="btn-outline">⭐ <span id="lbl-rate">Rate App</span></button>
                <a href="privacy.html" class="btn-outline" style="text-decoration:none;">🔒 <span id="lbl-privacy">Privacy Policy</span></a> 
                <a href="terms.html" class="btn-outline" style="text-decoration:none;">📜 <span id="lbl-terms">Terms & Conditions</span></a> 
                <a href="contact.html" class="btn-outline" style="text-decoration:none;">📞 <span id="lbl-support">Contact Support</span></a> 
                <button onclick="showAbout()" class="btn-outline">ℹ️ <span id="lbl-about">About App</span></button> 
                <button onclick="clearHistory()" class="btn-outline" style="color:#e11d48; border-bottom: none;"><i class="fas fa-trash-can"></i> <span id="lbl-clear-history">Clear History</span></button>
            </div>
            
            <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--text-muted);">
                <i class="fas fa-leaf" style="color:var(--primary-start)"></i> Informational only • Consult doctor
            </div> 
            <div style="text-align: center; margin-top: 0.5rem; font-size: 0.75rem; line-height: 1.4; opacity: 0.8;">
                Designed & Developed by NexCod Developer's<br><strong style="color:var(--primary-end);">Team Nexcod</strong>
            </div> 
        </div> 
    </div> 
    
    <div class="action-overlay" id="action-overlay" onclick="toggleActionSheet(false)"></div> 
    <div class="action-sheet" id="action-sheet"> 
        <div style="width: 3rem; height: 4px; background: rgba(0,0,0,0.1); margin: 0 auto 1.25rem; border-radius: 99px;"></div> 
        <h2 id="lbl-choose-scan" style="text-align: center; font-weight: 700; font-size: 1.15rem; color: var(--primary-end); margin-bottom: 1rem;">Choose Option</h2> 
        <button onclick="startCamera(); toggleActionSheet(false)" class="btn"> <i class="fas fa-camera"></i> <span id="lbl-scan-cam">Scan with Camera</span> </button> 
        <label for="gallery-input" class="btn btn-outline" onclick="toggleActionSheet(false)" style="margin-top: 0.6rem; border-radius: 99px; padding: 0.65rem 1rem;"> <i class="fas fa-image"></i> <span id="lbl-upload-img">Upload Image</span> </label> 
        <input type="file" id="gallery-input" accept="image/*"> 
    </div> 

    <div class="action-overlay" id="chat-overlay" onclick="closeChat()"></div>
    <div class="action-sheet chat-sheet" id="chat-sheet">
        <div class="chat-header">
            <h3><i class="fas fa-seedling" style="color:var(--primary-start);"></i> <span id="lbl-chat-title">AI Assistant</span></h3>
            <button class="chat-close-btn" onclick="closeChat()"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chat-body"></div>
        <div class="chat-input-area">
            <button class="chat-mic-btn" id="chat-mic-btn" onclick="startVoiceInput()"><i class="fas fa-microphone"></i></button>
            <input type="text" class="chat-input-box" id="chat-input" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)" oninput="handleChatInput()">
            <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    
    <div class="popup-overlay" id="popup-overlay" onclick="if(event.target===this) hideNotification()"> 
        <div class="popup-card" onclick="event.stopImmediatePropagation()"> 
            <div id="popup-icon" class="popup-icon">✅</div> 
            <div id="popup-title" class="popup-title"></div> 
            <div id="popup-msg" class="popup-msg"></div> 
            <button class="popup-close" onclick="hideNotification()">OK • Close</button> 
        </div> 
    </div> 
    
    <nav class="bottom-nav"> 
        <a class="nav-item active" onclick="switchTab('home',this)"><i class="fas fa-house-medical"></i><span id="nav-home">Home</span></a> 
        <a class="nav-item" onclick="switchTab('scan',this)"><i class="fas fa-leaf"></i><span id="nav-scan">Scan</span></a> 
        <a class="nav-item" onclick="switchTab('settings',this)"><i class="fas fa-gear"></i><span id="nav-settings">Settings</span></a> 
    </nav>
</div>

<script>
// CONFIG
const API_URL = "https://scanaushadhi.onrender.com";
const MAX_DAILY_SCANS = 10;
let isLoading = false;
let lastScanTime = 0;
let popupOpen = false;
let currentStream = null;
let voices = [];
let currentUtterance = null;

// Chat State
let currentScanContext = null;
let chatMessageCount = 0;
const MAX_CHAT_MESSAGES = 5;
let chatHistory = [];
let isChatLoading = false;

const t = {
    en: {
        appTitle:"Scan Aushadhi", scanMainBtn:"Scan Medicine", chooseScan:"Choose Option",
        scanCam:"Scan with Camera", uploadImg:"Upload Image", analyzing:"Analyzing image",
        empty:"No scans yet • Start now", limitReached:"Daily limit reached",
        noInternet:"No internet • Check connection", invalidMedicine:"Not a valid identifiable item",
        language:"Language", langDesc:"Output language", clear:"Clear History",
        privacy:"Privacy Policy", terms:"Terms & Conditions", support:"Contact Support",
        about:"About App", listen:"Voice Chat", stop:"Stop", cleared:"History cleared",
        scanSuccess:"Scan completed ✓", serverError:"Server busy • Try again later",
        cameraDenied:"Camera permission denied", cameraNotSupported:"Camera not supported", cameraError:"Camera error",
        mainUse:"Main Use", otherUses:"Other Uses", composition:"Composition",
        dosage:"Dosage", howToUse:"How To Use", sideEffects:"Side Effects",
        safety:"Safety Information", warnings:"Warnings",
        askMore:"Ask More", welcomeChat:"Namaste 🙏 How can I help you further with this product?",
        chatLimit:"Chat limit reached. Please scan again.", errorChat:"Something went wrong. Try again.",
        typeMessage:"Type a message...", chatTitle:"AI Assistant", voiceNotSupported:"Voice input not supported",
        share:"Share App", rate:"Rate App", toolsHeading: "Smart Tools",
        prepReader: "Prescription Reader", tabLoading: "Loading..."
    },
    hi: {
        appTitle:"स्कैन औषधि", scanMainBtn:"औषधि स्कैन करें", chooseScan:"विकल्प चुनें",
        scanCam:"कैमरा से स्कैन करें", uploadImg:"इमेज अपलोड करें", analyzing:"इमेज जांच रहे हैं",
        empty:"कोई स्कैन नहीं • अभी शुरू करें", limitReached:"दैनिक सीमा समाप्त",
        noInternet:"इंटरनेट नहीं है • कनेक्शन जांचें", invalidMedicine:"मान्य वस्तु की पहचान नहीं हुई",
        language:"भाषा", langDesc:"आउटपुट भाषा", clear:"इतिहास मिटाएं",
        privacy:"गोपनीयता नीति", terms:"नियम एवं शर्तें", support:"संपर्क करें",
        about:"ऐप के बारे में", listen:"वॉइस चैट", stop:"रोकें", cleared:"इतिहास मिटा दिया गया",
        scanSuccess:"स्कैन पूरा हुआ ✓", serverError:"सर्वर व्यस्त है • बाद में प्रयास करें",
        cameraDenied:"कैमरा अनुमति अस्वीकृत", cameraNotSupported:"कैमरा समर्थित नहीं है", cameraError:"कैमरा त्रुटि",
        mainUse:"मुख्य उपयोग", otherUses:"अन्य उपयोग", composition:"रचना",
        dosage:"खुराक", howToUse:"कैसे उपयोग करें", sideEffects:"दुष्प्रभाव",
        safety:"सुरक्षा जानकारी", warnings:"चेतावनी",
        askMore:"और पूछें", welcomeChat:"नमस्ते 🙏 बताइए मैं आपकी और क्या मदद कर सकता हूँ?",
        chatLimit:"चैट सीमा समाप्त। कृपया दोबारा स्कैन करें।", errorChat:"कुछ गलत हो गया। पुनः प्रयास करें।",
        typeMessage:"संदेश लिखें...", chatTitle:"AI सहायक", voiceNotSupported:"वॉयस इनपुट समर्थित नहीं है",
        share:"ऐप साझा करें", rate:"ऐप रेट करें", toolsHeading: "स्मार्ट टूल्स",
        prepReader: "प्रिस्क्रिप्शन रीडर", tabLoading: "लोड हो रहा है..."
    }
};

let state = {
    lang: localStorage.getItem('lang')||'en',
    history: JSON.parse(localStorage.getItem('scanHistory'))||[],
    scansToday: parseInt(localStorage.getItem('scansToday'))||0
};

if (localStorage.getItem('lastScanDate') !== new Date().toDateString()) {
    localStorage.setItem('scansToday','0');
    localStorage.setItem('lastScanDate',new Date().toDateString());
    state.scansToday = 0;
}

// UI HELPERS
function showNotification(msg, type='success', title='') {
    if (popupOpen) return;
    popupOpen = true;
    const overlay = document.getElementById('popup-overlay');
    document.getElementById('popup-icon').innerHTML = type==='success'?'✅':type==='error'?'❌':type==='warning'?'⚠️':'ℹ️';
    document.getElementById('popup-title').textContent = title || '';
    document.getElementById('popup-msg').textContent = msg;
    overlay.style.display = 'flex';
    setTimeout(() => overlay.classList.add('active'), 20);
}

function hideNotification() {
    const overlay = document.getElementById('popup-overlay');
    overlay.classList.remove('active');
    setTimeout(() => { overlay.style.display='none'; popupOpen=false; }, 250);
}

function vibrate(v=30) { navigator.vibrate?.(v); }

// INIT
document.addEventListener("DOMContentLoaded", () => {
    applyLanguage(state.lang);
    renderHistory();
    updateLimitUI();
    document.getElementById('language-select').value = state.lang;
    document.getElementById('gallery-input').addEventListener('change', handleImageUpload);
    initSpeech();

    const savedScan = localStorage.getItem("lastScan");
    if (savedScan) {
        try {
            currentScanContext = JSON.parse(savedScan);
            switchTab('scan', document.querySelectorAll('.nav-item')[1]);
            showResult(currentScanContext, true); 
        } catch (e) {
            console.error("Error parsing last scan", e);
        }
    }
});

function applyLanguage(lang) {
    state.lang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('app-title').textContent = t[lang].appTitle;
    document.getElementById('nav-home').textContent = t[lang].appTitle === "स्कैन औषधि" ? "होम" : "Home";
    document.getElementById('nav-scan').textContent = t[lang].appTitle === "स्कैन औषधि" ? "स्कैन" : "Scan";
    document.getElementById('nav-settings').textContent = t[lang].appTitle === "स्कैन औषधि" ? "सेटिंग्स" : "Settings";

    document.querySelectorAll('[id^="lbl-"]').forEach(el => {
        const k = el.id.replace('lbl-','');
        const camelKey = k.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
        if(t[lang][k]) el.textContent=t[lang][k];
        else if(t[lang][camelKey]) el.textContent=t[lang][camelKey];
    });
    
    const chatInput = document.getElementById('chat-input');
    if(chatInput) chatInput.placeholder = t[lang].typeMessage;
    
    renderHistory();
    updateLimitUI();
}

document.getElementById('language-select').addEventListener('change', e=>applyLanguage(e.target.value));

function updateLimitUI() {
    document.getElementById('lbl-scan-limit').textContent = state.lang==='hi' 
        ? `आज के फ्री स्कैन: ${state.scansToday}/${MAX_DAILY_SCANS}` 
        : `Daily Free Scans: ${state.scansToday}/${MAX_DAILY_SCANS}`;
}

function openScanner() {
    if (Date.now() - lastScanTime < 1200) return;
    if (state.scansToday >= MAX_DAILY_SCANS) { showNotification(t[state.lang].limitReached, 'warning', 'Limit'); return; }
    if (isLoading) return;
    lastScanTime = Date.now();
    vibrate(25);
    toggleActionSheet(true);
}

function toggleActionSheet(show) {
    document.getElementById('action-sheet').classList.toggle('active', show);
    document.getElementById('action-overlay').classList.toggle('active', show);
}

function switchTab(id, el) {
    if (document.getElementById('camera-container').style.display === 'block') stopCamera();
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));

    if (id === 'home') {
        document.getElementById(id).classList.add('active');
    } else {
        document.getElementById('tab-loader').classList.add('active');
        setTimeout(() => {
            if (el.classList.contains('active')) {
                document.getElementById('tab-loader').classList.remove('active');
                document.getElementById(id).classList.add('active');
            }
        }, 800);
    }
}

// CAMERA & UPLOAD
function startCamera() {
    if (isLoading) return;
    document.getElementById('scan-btn').style.display = 'none';
    document.getElementById('lbl-scan-limit').style.display = 'none';
    document.getElementById('camera-container').style.display = 'block';
    const video = document.getElementById('camera-preview');
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showNotification(t[state.lang].cameraNotSupported, 'error'); stopCamera(); return; }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(stream => {
        currentStream = stream;
        video.srcObject = stream;
        video.play();
        document.getElementById('capture-btn').onclick = capturePhoto;
    }).catch(err => {
        let msg = t[state.lang].cameraError;
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') msg = t[state.lang].cameraDenied;
        showNotification(msg, 'error');
        stopCamera();
    });
}

function stopCamera() {
    if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
    const video = document.getElementById('camera-preview');
    if (video) video.srcObject = null;
    document.getElementById('camera-container').style.display = 'none';
    document.getElementById('scan-btn').style.display = 'flex';
    document.getElementById('lbl-scan-limit').style.display = 'block';
}

function capturePhoto() {
    const video = document.getElementById('camera-preview');
    if (!video || !video.videoWidth) return;
    const canvas = document.getElementById('image-canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.74).split(',')[1];
    stopCamera();
    processImage(base64);
}

function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file || isLoading) return;
    const reader = new FileReader();
    reader.onload = () => {
        const img = new Image();
        img.onload = () => {
            const c = document.getElementById('image-canvas');
            const ctx = c.getContext('2d');
            let w=img.width, h=img.height;
            if(w>820){h*=820/w; w=820;}
            c.width=w; c.height=h; ctx.drawImage(img,0,0,w,h);
            const b64 = c.toDataURL('image/jpeg',0.74).split(',')[1];
            processImage(b64);
        };
        img.src = reader.result;
    };
    reader.readAsDataURL(file);
    document.getElementById('gallery-input').value = '';
    toggleActionSheet(false);
}

function processImage(base64) {
    isLoading = true;
    document.getElementById('scan-btn').disabled = true;
    document.getElementById('scan-result').style.display = 'none';
    document.getElementById('scan-loader').style.display = 'block';
    animateDots();
    callBackend(base64);
}

async function fetchWithRetry(url, options, retries = 1, timeout = 15000) {
    for (let i = 0; i <= retries; i++) {
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        } catch (error) {
            if (i === retries) throw error;
            console.warn(`Retry ${i + 1}/${retries} failed:`, error.message);
        }
    }
}

// BACKEND
async function callBackend(base64) {
    const loaderEl = document.getElementById('scan-loader');
    if (!navigator.onLine) { resetLoader(loaderEl); showNotification(t[state.lang].noInternet, 'error', 'Offline'); return; }

    try {
        const responseData = await fetchWithRetry(`${API_URL}/scan`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64, lang: state.lang })
        }, 1, 15000);

        resetLoader(loaderEl);

        if (!responseData || !responseData.success || !responseData.data) {
            showNotification(t[state.lang].invalidMedicine, 'warning', 'Invalid'); 
            return;
        }

        const parsed = responseData.data;
        parsed.name = parsed.name || "Unknown Product";
        parsed.sections = parsed.sections || {};
        parsed.confidence = parsed.confidence || 0;

        state.scansToday++; localStorage.setItem('scansToday', state.scansToday); updateLimitUI();
        vibrate([60,30,60]);
        showNotification(t[state.lang].scanSuccess, 'success', 'Great!');
        
        currentScanContext = parsed;
        localStorage.setItem("lastScan", JSON.stringify(parsed));
        localStorage.setItem("lastMedicine", parsed.name);
        localStorage.removeItem("chatHistory");
        chatHistory = [];

        setTimeout(() => showResult(parsed, false), 500);
    } catch (error) {
        resetLoader(loaderEl); 
        const isTimeout = error.name === 'AbortError';
        const msg = isTimeout ? "Connection timed out" : t[state.lang].serverError;
        showNotification(msg, 'error', 'Failed');
        console.error("Backend Error:", error);
    }
}

function resetLoader(loaderEl) {
    loaderEl.style.display = 'none'; isLoading = false; document.getElementById('scan-btn').disabled = false;
}

function showResult(data, isRestore = false) {
    let html = `<div class="result-name">${data.name || "Unknown Product"}</div>`;
    
    if (data.confidence) {
        const confText = state.lang === 'hi' ? 'सटीकता' : 'Confidence Match';
        html += `<div class="result-confidence">
                    <i class="fas fa-check-circle"></i> ${confText}: ${data.confidence}%
                 </div>`;
    }

    if (data.category || data.type) {
        html += `<div class="badge-container">`;
        if (data.category && data.category !== "unknown") html += `<span class="badge category-badge">${data.category}</span>`;
        if (data.type && data.type !== "unknown") html += `<span class="badge type-badge">${data.type}</span>`;
        html += `</div>`;
    }

    const sectionsConfig = [
        { key: 'mainUse', icon: '🎯', label: t[state.lang].mainUse },
        { key: 'otherUses', icon: '🔄', label: t[state.lang].otherUses },
        { key: 'composition', icon: '🧪', label: t[state.lang].composition },
        { key: 'dosage', icon: '📏', label: t[state.lang].dosage },
        { key: 'howToUse', icon: '📝', label: t[state.lang].howToUse },
        { key: 'sideEffects', icon: '⚠️', label: t[state.lang].sideEffects },
        { key: 'safety', icon: '🛡️', label: t[state.lang].safety },
        { key: 'warnings', icon: '🚫', label: t[state.lang].warnings }
    ];

    const safeSections = data.sections || {};

    sectionsConfig.forEach(sec => {
        const val = safeSections[sec.key];
        if (val && val.trim() !== "") {
            const lines = val.split(/(?<=\.)\s+|\n/).filter(l => l.trim() !== "");
            const bullets = lines.map(l => `<li>${l}</li>`).join('');
            html += `
            <div class="result-card">
                <div class="result-card-header"><span class="result-icon">${sec.icon}</span><span class="result-label">${sec.label}</span></div>
                <ul class="result-value-list">${bullets}</ul>
            </div>`;
        }
    });

    html += `
    <div style="display:flex; gap:0.6rem; margin-top:1rem;">
        <button class="btn btn-outline" onclick="startVoiceChat()" style="flex:1;">
            <i class="fas fa-microphone"></i> <span>${t[state.lang].listen}</span>
        </button>
        <button class="btn" onclick="openChat()" style="flex:1;">
            <i class="fas fa-robot"></i> <span>${t[state.lang].askMore}</span>
        </button>
    </div>`;

    const el = document.getElementById('scan-result');
    el.innerHTML = html; el.classList.add('appear'); el.style.display = 'block';
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

    if (!isRestore) {
        state.history.unshift({id:Date.now(), name: data.name || "Unknown Product", date:new Date().toLocaleDateString()});
        localStorage.setItem('scanHistory', JSON.stringify(state.history));
        renderHistory();
    }
}

// CHAT
function openChat() {
    if (!currentScanContext) return;
    document.getElementById('chat-overlay').classList.add('active');
    document.getElementById('chat-sheet').classList.add('active');
    
    const body = document.getElementById('chat-body');
    const input = document.getElementById('chat-input');
    const savedChat = localStorage.getItem("chatHistory");
    
    if (savedChat) {
        chatHistory = JSON.parse(savedChat);
        body.innerHTML = ''; chatMessageCount = 0;
        chatHistory.forEach(msg => {
            if (msg.role === 'user') { appendChatMessage('user', msg.content); chatMessageCount++; } 
            else if (msg.role === 'assistant') { appendChatMessage('ai', msg.content); }
        });
    } else {
        chatMessageCount = 0; body.innerHTML = '';
        const langName = state.lang === 'hi' ? 'Hindi' : 'English';
        chatHistory = [{ role: "system", content: `You are a helpful product and medicine assistant. Answer clearly based on the scanned item. Respond in ${langName}. Scanned Item: ${JSON.stringify(currentScanContext)}` }];
        appendChatMessage('ai', t[state.lang].welcomeChat);
    }
    
    input.disabled = false; document.getElementById('chat-mic-btn').disabled = false;
    handleChatInput();
    setTimeout(() => { 
        body.scrollTop = body.scrollHeight; 
        input.focus(); 
    }, 300);
}

function closeChat() {
    document.getElementById('chat-input').blur(); // Close the keyboard explicitly
    document.getElementById('chat-overlay').classList.remove('active');
    
    const chatSheet = document.getElementById('chat-sheet');
    chatSheet.classList.remove('active');
    
    // Clear any inline height injected by visualViewport after animation wraps
    setTimeout(() => { chatSheet.style.height = ''; }, 350); 
    
    if ('speechSynthesis' in window && speechSynthesis.speaking) speechSynthesis.cancel();
}

async function sendMessage() {
    const inputEl = document.getElementById('chat-input');
    const text = inputEl.value.trim();
    if (!text || isChatLoading) return;
    
    if (chatMessageCount >= MAX_CHAT_MESSAGES) {
        appendSystemMessage(t[state.lang].chatLimit);
        inputEl.disabled = true; document.getElementById('chat-mic-btn').disabled = true; return;
    }
    if ('speechSynthesis' in window && speechSynthesis.speaking) speechSynthesis.cancel();

    appendChatMessage('user', text);
    inputEl.value = ''; handleChatInput();
    
    chatHistory.push({ role: "user", content: text });
    chatMessageCount++; isChatLoading = true; showTypingIndicator();

    try {
        const response = await fetch(`${API_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: chatHistory })
        });
        if (!response.ok) throw new Error('API Error');
        const data = await response.json();
        
        hideTypingIndicator(); isChatLoading = false;
        const aiResponse = data.reply;
        chatHistory.push({ role: "assistant", content: aiResponse });
        localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

        appendChatMessage('ai', aiResponse); speakText(aiResponse);
        
        if (chatMessageCount >= MAX_CHAT_MESSAGES) {
            appendSystemMessage(t[state.lang].chatLimit);
            inputEl.disabled = true; document.getElementById('chat-mic-btn').disabled = true;
        }
    } catch (error) {
        hideTypingIndicator(); isChatLoading = false;
        chatHistory.pop(); chatMessageCount--;
        appendSystemMessage(t[state.lang].errorChat);
        inputEl.value = text; handleChatInput();
    }
}

// UTILS
function renderHistory() {
    const cont = document.getElementById('history-container');
    if (!state.history.length) {
        cont.innerHTML = `<div class="empty-state"><i class="fas fa-prescription-bottle-medical" style="font-size:3.5rem;color:var(--primary-start);opacity:0.2"></i><p style="margin-top: 1rem; font-weight: 500;">${t[state.lang].empty}</p></div>`;
        return;
    }
    cont.innerHTML = state.history.map(i=>`<div class="card"><div style="display:flex;gap:0.8rem;align-items:center;"><span style="font-size:2rem;">💊</span><div><strong style="font-size:1rem;color:var(--text-main);">${i.name}</strong><br><small style="color:var(--text-muted); font-weight: 500;">📅 ${i.date}</small></div></div></div>`).join('');
}

function clearHistory() {
    showNotification("Clear all scan history?", 'warning', 'Confirm');
    setTimeout(() => {
        state.history = []; localStorage.removeItem('scanHistory'); localStorage.removeItem('lastScan'); localStorage.removeItem('chatHistory');
        renderHistory(); hideNotification(); showNotification(t[state.lang].cleared, 'success');
    }, 1200);
}

function handleChatInput() { document.getElementById('chat-send-btn').disabled = document.getElementById('chat-input').value.trim().length === 0 || isChatLoading; }
function handleChatKeyPress(e) { if (e.key === 'Enter' && !isChatLoading) sendMessage(); }
function appendChatMessage(role, text) {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div'); div.className = `chat-bubble ${role}`; div.textContent = text;
    body.appendChild(div); body.scrollTop = body.scrollHeight;
}
function appendSystemMessage(text) {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div'); div.className = `chat-bubble system`; div.textContent = text;
    body.appendChild(div); body.scrollTop = body.scrollHeight;
}
function showTypingIndicator() {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div'); div.className = `chat-bubble ai`; div.id = `chat-typing`;
    div.innerHTML = `<div class="premium-loader" style="margin:0; padding: 0.2rem;"><div class="dot" style="width:6px;height:6px;"></div><div class="dot" style="width:6px;height:6px;"></div><div class="dot" style="width:6px;height:6px;"></div></div>`;
    body.appendChild(div); body.scrollTop = body.scrollHeight;
}
function hideTypingIndicator() { const ind = document.getElementById('chat-typing'); if (ind) ind.remove(); }
function animateDots() {
    let dots = document.getElementById('dots'); let count = 0;
    const int = setInterval(() => { if (!isLoading) { clearInterval(int); return; } count = (count+1)%4; dots.textContent = '.'.repeat(count); }, 400);
}

function initSpeech() {
    if ('speechSynthesis' in window) {
        const loadVoices = () => { voices = speechSynthesis.getVoices(); };
        speechSynthesis.onvoiceschanged = loadVoices;
        setTimeout(() => { if (speechSynthesis.getVoices().length === 0) loadVoices(); }, 300);
    }
}
function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    if (speechSynthesis.speaking) speechSynthesis.cancel();
    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.lang = state.lang === 'hi' ? 'hi-IN' : 'en-US';
    const preferred = state.lang === 'hi' ? 'hi' : 'en';
    const bestVoice = voices.find(v => v.lang.toLowerCase().includes(preferred)) || voices.find(v => v.lang.startsWith(preferred)) || null;
    if (bestVoice) currentUtterance.voice = bestVoice;
    speechSynthesis.speak(currentUtterance);
}
function startVoiceChat() { openChat(); setTimeout(() => { startVoiceInput(); }, 400); }
function startVoiceInput() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { showNotification(t[state.lang].voiceNotSupported, "error"); return; }
    if (isChatLoading) return;
    if ('speechSynthesis' in window && speechSynthesis.speaking) speechSynthesis.cancel();
    const micBtn = document.getElementById('chat-mic-btn');
    if (micBtn.classList.contains('listening')) return; 

    const recognition = new SpeechRecognition();
    recognition.lang = state.lang === 'hi' ? 'hi-IN' : 'en-US'; recognition.interimResults = false; recognition.maxAlternatives = 1;

    recognition.onstart = () => { micBtn.classList.add('listening'); document.getElementById('chat-input').placeholder = "Listening..."; };
    recognition.onresult = (event) => { document.getElementById('chat-input').value = event.results[0][0].transcript; handleChatInput(); setTimeout(sendMessage, 500); };
    recognition.onerror = (event) => { micBtn.classList.remove('listening'); document.getElementById('chat-input').placeholder = t[state.lang].typeMessage; if(event.error !== 'no-speech') showNotification("Voice recognition failed", "error"); };
    recognition.onend = () => { micBtn.classList.remove('listening'); document.getElementById('chat-input').placeholder = t[state.lang].typeMessage; };
    recognition.start(); vibrate(15);
}

// Ripple & Visual Viewport Handlers
document.addEventListener('click', function(e) {
    const target = e.target.closest('.btn, .btn-outline, .nav-item, .chat-mic-btn, .chat-send-btn, .popup-close, label.btn');
    if (!target) return;
    if (window.getComputedStyle(target).position === 'static') target.style.position = 'relative';
    target.style.overflow = 'hidden';
    const rect = target.getBoundingClientRect();
    const ripple = document.createElement('span');
    const diameter = Math.max(target.clientWidth, target.clientHeight);
    ripple.style.width = ripple.style.height = `${diameter}px`;
    ripple.style.left = `${e.clientX - rect.left - (diameter/2)}px`;
    ripple.style.top = `${e.clientY - rect.top - (diameter/2)}px`;
    ripple.classList.add('ripple');
    const existing = target.querySelector('.ripple'); if(existing) existing.remove();
    target.appendChild(ripple);
    setTimeout(() => { ripple.remove(); }, 500); 
});

window.visualViewport?.addEventListener("resize", () => {
    const chatSheet = document.getElementById("chat-sheet");
    if (chatSheet && chatSheet.classList.contains('active')) {
        chatSheet.style.height = window.visualViewport.height + "px";
        document.getElementById("chat-body").scrollTop = document.getElementById("chat-body").scrollHeight;
    }
});
